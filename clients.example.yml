# clients.example.yml — copy to clients.yml and fill in.
# clients.yml is gitignored. Never commit real credentials.
# Secrets live in environment variables; this file points at them by name.

version: 1

defaults:
  gs1:
    environment: test               # test | production
    api_version: v2                 # locked; endpoint prefix is /digitallinkv2/v2/
    # Auth is OAuth2 client-credentials: the client mints a 1h JWT from the
    # client_id/client_secret env vars below and sends it as a Bearer token.
    identification_key_type: "Gtin" # enum in v2; always Gtin for our scope
    digital_link_url_pattern: "https://id.gs1.org/01/{gtin14}"
    resolver_settings:
      use_gs1_resolver: true        # matches decision §3.1
      resolver_domain_name: null    # only used when use_gs1_resolver: false
    default_media_type: "text/html" # for HTML product-page targets
    batch_size: 50                  # for bulk endpoint
  wordpress:
    post_type: page
    post_status: publish
    multilingual_plugin: none       # none | polylang | wpml
    default_language: nl
    languages: [nl]
    image_handling: url_in_export   # url_in_export | local_folder | manual
  qr:
    formats: [svg, png]
    size_mm: 20
    error_correction: M
    dpi: 300
  flow:
    on_change: prompt
    on_missing_field: prompt
    batch_size: 50

clients:

  # Example — Noviplast: custom post type, Polylang, NL + FR
  noviplast:
    display_name: "Noviplast B.V."
    enabled: true

    gs1:
      # accountNumber differs per environment — take the test value from the
      # minted token's accountNumber claim; verify production against MyGS1.
      account_number_test: "8720796420906"
      account_number_production: "8712345000003"
      # OAuth2 client credentials per environment (issued via MyGS1 / dev portal)
      client_id_env_test: NOVIPLAST_GS1_CLIENT_SANDBOX_ID
      client_secret_env_test: NOVIPLAST_GS1_CLIENT_SANDBOX_SECRET
      client_id_env_production: NOVIPLAST_GS1_CLIENT_ID
      client_secret_env_production: NOVIPLAST_GS1_CLIENT_SECRET

    export:
      # 'gdsn' = multi-sheet GS1 Data Source / GDSN datapool export (one worksheet
      # per module, keyed on Gtin + TargetMarketCountryCode). 'flat' = single-sheet
      # MyGS1 article list (see column_map/extras_columns). See IMPLEMENTATION_SPEC §3.
      format: gdsn
      path: "./input/noviplast/products.xlsx"
      # Markets in the order to consult them (highest priority first). Every market row
      # carries every language, so which market *has* a value varies by product — the tool
      # takes the first non-blank value per product/field/language walking this order.
      # Replaced market_language {528:nl, 056:fr}, whose 1:1 constraint cost coverage and
      # could not resolve products whose markets disagree. Languages come from
      # wordpress.languages.
      market_priority: ["528", "056", "276", "442"]   # NL, BE, DE, LU
      # ProductRecord field → GDSN attribute source. `attribute` is the GDSN attribute
      # number (e.g. "3297") or a path segment name (e.g. GpcCategoryCode). Discover
      # these by running: python -m scripts.inspect_export input/noviplast/products.xlsx
      gdsn_map:
        # 3301 Functional Name = the page title (big name). The clean functional name
        # ("voegstrijker"), matching the live "Cable Organiser" style — NOT 3318, which
        # carries material+colour noise ("Noviplast Voegstrijker kunststof oranje"), and
        # NOT 3297, which is DescriptionShort, an internal logistics string. Verified live
        # 2026-07-17. No strip_prefix — 3301 has no brand prefix. See docs §4.1.
        # DEFERRED to the generator: prefix/suffix with 3332 (Product variation) — blind
        # concatenation produces duplicates ("Snoeischaar snoeischaar").
        product_name:      { sheet: TradeItemDescription,            attribute: "3301", localised: true }
        # 1083 TradeItemMarketingMessage. NOT the tagline — exhaustive search disproved
        # that (34/36 live taglines match nothing here; 1083 is paragraph-length marketing
        # copy). Kept parsed as a GENERATOR INPUT only; feeds no ACF slot (see acf_map).
        # No max_length — the 120-char limit was the tagline slot's width, which 1083 no
        # longer fills, so its value_too_long findings were measuring the wrong field.
        # report_issues: false — a generator input; its blanks are the generator's future
        # work, not today's source-fix queue. §4.2.
        description_short: { sheet: MarketingInformation,            attribute: "1083", localised: true, report_issues: false }
        # 1067 TradeItemFeatureBenefit = the ranked USP source (tagline + Eigenschappen) when
        # present. multivalue: true joins every TradeItemFeatureBenefit[n] slot with a newline so
        # the generator sees all of them (the feed spreads USPs across slots AND newline-separates
        # within a slot); the generator splits on newlines to rank. report_issues: false — a
        # generator input, its blanks are the generator's work (flagged there), not the source queue.
        description_long:  { sheet: MarketingInformation,            attribute: "1067", localised: true, multivalue: true, report_issues: false }
        brand:             { sheet: TradeItemDescription,            attribute: "3336" }
        net_content:       { sheet: TradeItemMeasurements,           attribute: "3510", with_unit: true }
        gpc_brick_code:    { sheet: BrickGPCCommercialData,          attribute: GpcCategoryCode }
        image_url:         { sheet: ReferencedFileDetailInformation, attribute: "2485", primary_file: true }
      # Named pass-through attributes carried verbatim into ProductRecord.extras.
      gdsn_extras:
        functional_name:   { sheet: TradeItemDescription, attribute: "3301", localised: true }
        logistics_name:    { sheet: TradeItemDescription, attribute: "3297", localised: true }
        # 3318 = the old product_name source, kept as a pass-through now the title comes
        # from 3301. Carried, not published: it holds the brand-prefix typos ("Nociplast",
        # "Noviplat"), which the report may check once its scope widens past published
        # fields.
        marketing_name:    { sheet: TradeItemDescription, attribute: "3318", localised: true }
        # --- Content-generator inputs (see docs/clients/noviplast-generator-spec.md) ---
        # 3332 Product variation — the intelligent title suffix. Near-empty (4/127), so the
        # generator's title step is a deterministic dedup rule, not LLM work. Localised, but
        # only the default-language token is carried (extras collapse to one language).
        product_variation: { sheet: TradeItemDescription,   attribute: "3332", localised: true }
        # Dimensions (all 127/127) carry a MeasurementUnitCode ("MMT" = mm); with_unit keeps
        # the code so the Technische-details assembler decodes it via lib/units like
        # net_content. Feed both the deterministic spec line and the Eigenschappen prompt.
        dim_height:        { sheet: TradeItemMeasurements,   attribute: "3498", with_unit: true }
        dim_width:         { sheet: TradeItemMeasurements,   attribute: "3520", with_unit: true }
        dim_depth:         { sheet: TradeItemMeasurements,   attribute: "3492", with_unit: true }
        # Material (75/127) is language-agnostic (Information[0]/Material[n]/Value, no
        # LanguageCode pair) so it is a scalar, matched by the path segment "Material", not a
        # number. Watch for the junk value "zzzanders" — the generator treats it as absent.
        material:          { sheet: BrickGPCCommercialData,  attribute: "Material" }

    wordpress:
      site_url: "https://www.noviplast.nl"
      username: "automation-bot"
      app_password_env: NOVIPLAST_WP_APP_PASS
      post_type: noviplast
      multilingual_plugin: wpml
      # WPML has no core REST route for language assignment or translation linking,
      # so the site hosts a small helper (Code Snippet / mu-plugin). Its namespace is
      # per-site — see docs/clients/noviplast-page-adapter.md §7 for the source.
      wpml_helper_path: "/wp-json/noviplast/v1/translations"
      languages: [nl, fr]
      default_language: nl
      image_handling: url_in_export
      taxonomies:
        noviplast-categories:
          map_from_column: "category"
      # The Oxygen template renders from ACF, not post_content, so these fields *are* the
      # page (docs/clients/noviplast-page-adapter.md §3). Field names are the client's;
      # they live here rather than in lib/.
      #
      # EMPTY on purpose. Both slots are the tagline (product_title is the sentence below
      # the name; product_header_video_text is the banner — same value, verified live).
      # Their source is generator-owned: 1083 when present, else the first generated USP —
      # not a deterministic mapping. They were wired 1:1 to description_short (1083), which
      # the pilot proved wrong. Pages carry the title (and image) only until the generator
      # lands; the missing taglines are the generator's work list. See docs §4.1/§4.2.
      # product_description (tagline + Eigenschappen + Technische details) also waits on
      # the generator + H87 unit decoding (§4.1, §8).
      acf_map: {}
      slug_pattern: "p-{gtin}"
      target_url_pattern: "{site_url}/{lang_segment}{post_type}/{slug}/"

    template:
      override_dir: templates/noviplast
      files:
        nl: product.nl.html
        fr: product.fr.html

    gs1_links:
      # One link per configured language is always emitted — GS1's CreateOrUpdate replaces
      # the whole links array, so a language left out is a language deleted from the
      # resolver. `default` applies to the default language's link only.
      - link_type: "gs1:pip"
        default: true
        public: true
        title_pattern: "{product_name}"

    # Create-only gate (not in the datasource export): a product is a candidate for
    # page/QR creation only when it is already in GS1 and not yet on the website.
    # Column names are relabelable; these defaults match the Noviplast control file.
    website_status:
      path: "./input/noviplast/website_status.xlsx"
      gtin_column: "Barcode"
      on_website_column: "Momenteel op Website"
      in_gs1_column: "Al in Gs1"
      site_link_column: "Link naar site"

    # Content generator (tagline + Eigenschappen copy). Two producers share one cache and
    # contract: the Cowork-native `content-generator` skill (writes copy in-session, no API key)
    # and the headless API backend (`python -m scripts.run_generate <id> --backend api`, which
    # calls the Anthropic Messages API via lib/llm.py). `enabled: true` permits the API backend
    # when the key env var is set; the Cowork path works without it. `prompt_version` selects the
    # frozen voice template at prompts/{id}/generation.{prompt_version}.md and is part of the cache
    # fingerprint, so bumping it invalidates cached copy. Omit this whole block to leave the
    # generator un-configured (the API backend then refuses to run). See
    # docs/clients/noviplast-generator-spec.md.
    generator:
      enabled: true
      model: claude-sonnet-5      # prefer a pinned snapshot id in production
      prompt_version: v1
      api_key_env: ANTHROPIC_API_KEY
      max_tokens: 1024

    # Phase 7.5: GPC brick -> site category. The GDSN feed carries a GPC brick
    # (gpc_brick_code, attr GpcCategoryCode) but not the client's marketing category, so
    # this maps one to the other. It is NOT derivable from the feed: bricks span categories
    # (10003865 holds garden tools AND a nutcracker) and the client scheme is not semantic
    # (Power Splash, a shower head, is filed under keuken). So a brick_category_map plus a
    # per-GTIN override list, built from the GS1 DIY sector datamodel and signed off by the
    # client. Draft one with: python -m scripts.build_brick_map noviplast --datamodel <file>
    # --code-column <c> --category-column <c>. Unmapped bricks warn and leave the category
    # unset — never guess. See docs/clients/noviplast-page-adapter.md §5.7.
    #
    # The VALUES below are illustrative placeholders, not the signed-off map. Replace them.
    categories:
      terms: [keuken, doe_het_zelf, schoonmaak, tuin, dier, specials]
      brick_category_map:
        "10003865": tuin           # garden tools (the nutcracker is overridden per-GTIN below)
        "10006459": specials       # lighting has no category of its own -> specials
      overrides:
        "08713195000XXX": keuken   # the nutcracker in brick 10003865 (illustrative GTIN)
      # on_unmapped: warn          # fixed; shown for documentation only
      # require_terms_exist: true  # resolved decision: require the WP term to pre-exist,
      #                            # warn on miss. Enforced at the future term-assignment step.
